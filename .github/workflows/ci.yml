name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Structural checks
        run: |
          test -f AGENT_CARD.md
          test -f docs/RUNBOOK.md
          test -f docs/ARCHITECTURE.md
          test -f docker-compose.yml
          python -c "from app.config import GEMINI_MODEL; assert GEMINI_MODEL == 'gemini-2.5-flash'"
      - name: Test with coverage
        env:
          DATABASE_PATH: ":memory:"
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=85

  docker-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build --tag civic-incident-coordinator:ci .
